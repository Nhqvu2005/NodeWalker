version: '3.8'

services:
  nodewalker:
    build: .
    container_name: nodewalker
    ports:
      - "8585:8585"  # NodeWalker API
      - "9222:9222"  # Chrome DevTools Protocol (optional, for debugging)
    environment:
      - NODEWALKER_CHROME_PORT=9222
    volumes:
      # Optional: mount local browser_config.json to customize browser selection
      - ./browser_config.json:/app/browser_config.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8585/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
